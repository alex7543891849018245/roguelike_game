name: 🏗️ Сборка APK с Buildozer

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      version:
        description: '📦 Версия приложения'
        required: false
        default: '0.1.3'
      clean_cache:
        description: '🧹 Очистить кэш перед сборкой'
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: 📱 Сборка APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60  # Максимальное время сборки
    
    strategy:
      fail-fast: false  # Не останавливать при первой ошибке
      matrix:
        arch: [arm64-v8a]  # Можно добавить armeabi-v7a если нужно
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            buildozer.spec
      
      - name: 📦 Install system dependencies
        run: |
          echo "📦 Установка системных зависимостей..."
          sudo apt update
          sudo apt install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            python3-venv \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            wget \
            curl \
            build-essential \
            ccache \
            software-properties-common \
            ninja-build \
            patchelf \
            && echo "✅ Системные зависимости установлены"
      
      - name: 📦 Install Python dependencies
        run: |
          echo "📦 Установка Python зависимостей..."
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.36
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          echo "✅ Python зависимости установлены"
      
      - name: 💾 Cache Buildozer
        if: github.event.inputs.clean_cache != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.android
            ~/.ccache
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec', 'requirements.txt') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec', 'requirements.txt') }}
            ${{ runner.os }}-buildozer-
      
      - name: 🧹 Clean cache (if requested)
        if: github.event.inputs.clean_cache == 'true'
        run: |
          echo "🧹 Очистка кэша..."
          rm -rf ~/.buildozer
          rm -rf ~/.android
          rm -rf ~/.ccache
          echo "✅ Кэш очищен"
      
      - name: 🔧 Fix common Buildozer issues
        run: |
          echo "🔧 Применяем предварительные исправления..."
          
          # === 1. Исправление для лицензий SDK ===
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          
          # === 2. Исправление для build-tools ===
          mkdir -p ~/.buildozer/android/platform/android-sdk/build-tools
          
          # === 3. Исправление для NDK ===
          rm -rf ~/.buildozer/android/platform/android-ndk-* 2>/dev/null || true
          
          # === 4. Исправление для PATH ===
          echo 'export PATH=$PATH:~/.local/bin:~/.buildozer/android/platform/android-sdk/platform-tools' >> ~/.bashrc
          
          # === 5. Исправление для ccache ===
          ccache -M 5G
          ccache -s
          
          echo "✅ Предварительные исправления применены"
      
      - name: 🤖 Accept Android licenses automatically
        run: |
          echo "🤖 Автоматическое принятие лицензий Android SDK..."
          
          # Создаем скрипт для автоматического принятия лицензий
          cat > accept_licenses.sh << 'EOF'
          #!/bin/bash
          while IFS= read -r line; do
            echo "$line"
            if [[ "$line" == *"Accept? (y/N):"* ]]; then
              echo "y"
            fi
          done < "${1:-/dev/stdin}"
          EOF
          
          chmod +x accept_licenses.sh
          
          # Устанавливаем sdkmanager если его нет
          if [ ! -f ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager ]; then
            echo "📥 Скачиваем command line tools..."
            mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
            unzip -q commandlinetools-linux-9477386_latest.zip -d ~/.buildozer/android/platform/android-sdk/cmdline-tools
            mv ~/.buildozer/android/platform/android-sdk/cmdline-tools/cmdline-tools ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          fi
          
          # Принимаем лицензии
          yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          echo "✅ Лицензии приняты"
      
      - name: 🔧 Verify Android SDK components
        run: |
          echo "🔧 Проверка компонентов Android SDK..."
          
          # Создаем локальный SDK если нужно
          export ANDROID_HOME=~/.buildozer/android/platform/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # Устанавливаем нужные компоненты если их нет
          if [ ! -d "$ANDROID_HOME/platforms/android-33" ]; then
            echo "📥 Устанавливаем Android SDK Platform 33..."
            yes | sdkmanager "platforms;android-33" || true
          fi
          
          if [ ! -d "$ANDROID_HOME/build-tools/33.0.0" ]; then
            echo "📥 Устанавливаем build-tools 33.0.0..."
            yes | sdkmanager "build-tools;33.0.0" || true
          fi
          
          # Проверяем наличие aidl
          if [ -f "$ANDROID_HOME/build-tools/33.0.0/aidl" ]; then
            echo "✅ aidl найден"
            ln -sf "$ANDROID_HOME/build-tools/33.0.0/aidl" "$ANDROID_HOME/build-tools/aidl" || true
          else
            echo "⚠️ aidl не найден, но buildozer должен создать его"
          fi
          
          echo "✅ Проверка завершена"
      
      - name: 🏗️ Build APK with Buildozer
        id: build
        run: |
          echo "🏗️ Начинаем сборку APK..."
          echo "📱 Приложение: Roguelike Adventure"
          echo "📦 Версия: ${{ github.event.inputs.version || '0.1.3' }}"
          
          # Создаем папку для логов
          mkdir -p build_logs
          
          # Пробуем сборку до 3 раз
          MAX_RETRIES=3
          RETRY_COUNT=0
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            echo "🔄 Попытка сборки #$((RETRY_COUNT+1))..."
            
            # Запускаем сборку с таймаутом
            timeout 45m buildozer android debug 2>&1 | tee build_logs/build_$RETRY_COUNT.log
            
            # Проверяем наличие APK
            APK_FILE=$(find bin -name "*.apk" 2>/dev/null | head -n 1)
            
            if [ -n "$APK_FILE" ]; then
              echo "✅ APK найден! Сборка успешна на попытке #$((RETRY_COUNT+1))"
              echo "apk_file=$APK_FILE" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            echo "⚠️ APK не найден, очищаем и пробуем снова..."
            
            # Очищаем временные файлы но сохраняем SDK
            rm -rf ~/.buildozer/android/platform/build-* 2>/dev/null || true
            rm -rf ~/.buildozer/android/platform/android-ndk-* 2>/dev/null || true
            
            RETRY_COUNT=$((RETRY_COUNT+1))
          done
          
          echo "❌ Не удалось собрать APK после $MAX_RETRIES попыток"
          echo "📋 Последние 50 строк последнего лога:"
          tail -n 50 build_logs/build_$((MAX_RETRIES-1)).log
          exit 1
      
      - name: 🔍 Find and prepare APK
        if: steps.build.outputs.apk_file != ''
        id: apk
        run: |
          APK_FILE="${{ steps.build.outputs.apk_file }}"
          
          if [ ! -f "$APK_FILE" ]; then
            # Ищем альтернативный APK
            APK_FILE=$(find bin -name "*.apk" | head -n 1)
          fi
          
          if [ -z "$APK_FILE" ]; then
            echo "❌ APK файл не найден!"
            exit 1
          fi
          
          echo "✅ Найден APK: $APK_FILE"
          echo "📦 Размер: $(ls -lh $APK_FILE | awk '{print $5}')"
          
          # Генерируем имя файла
          VERSION="${{ github.event.inputs.version || '0.1.3' }}"
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          FILENAME="Roguelike-Adventure-v${VERSION}-${SHORT_SHA}.apk"
          
          cp "$APK_FILE" "./$FILENAME"
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "size=$(ls -lh $FILENAME | awk '{print $5}')" >> $GITHUB_OUTPUT
      
      - name: 📤 Upload APK
        if: steps.apk.outputs.filename != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.filename }}
          path: ./${{ steps.apk.outputs.filename }}
          if-no-files-found: error
          retention-days: 90
          compression-level: 0
      
      - name: 📊 Build Summary
        if: always()
        run: |
          echo "## 📱 Результат сборки" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -n "${{ steps.apk.outputs.filename }}" ]; then
            echo "✅ **APK успешно собран!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📦 Файл" >> $GITHUB_STEP_SUMMARY
            echo "- **Имя:** \`${{ steps.apk.outputs.filename }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Размер:** ${{ steps.apk.outputs.size }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📥 Скачать" >> $GITHUB_STEP_SUMMARY
            echo "APK доступен в разделе **Artifacts** выше ☝️" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Сборка не удалась**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 🔍 Диагностика" >> $GITHUB_STEP_SUMMARY
            echo "Проверьте логи выше для исправления ошибок." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚡ Статистика ccache" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ccache -s >> $GITHUB_STEP_SUMMARY 2>&1 || true
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
      
      - name: 🔍 Debug information (if failed)
        if: failure()
        run: |
          echo "🔍 Сбор информации для отладки..."
          
          echo "📁 Содержимое папки bin:"
          ls -la bin/ || echo "Папка bin не существует"
          
          echo "📁 Содержимое ~/.buildozer:"
          ls -la ~/.buildozer/ || echo "Папка .buildozer не существует"
          
          echo "📁 Содержимое ~/.android:"
          ls -la ~/.android/ || echo "Папка .android не существует"
          
          echo "📋 Логи сборки:"
          find build_logs -name "*.log" -exec sh -c 'echo "=== {} ==="; tail -n 20 {}' \;
