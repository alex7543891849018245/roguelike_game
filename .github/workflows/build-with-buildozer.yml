name: 🏗️ Сборка APK (только arm64-v8a)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      version:
        description: '📦 Версия приложения'
        required: false
        default: '0.1.3'
      clean_cache:
        description: '🧹 Очистить кэш перед сборкой'
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: 📱 Сборка APK (arm64-v8a)
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            buildozer.spec
      
      - name: 📦 Install system dependencies
        run: |
          echo "📦 Установка системных зависимостей..."
          sudo apt update
          sudo apt install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            python3-venv \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            wget \
            curl \
            build-essential \
            ccache \
            patchelf
          echo "✅ Системные зависимости установлены"
      
      - name: 📦 Install Python dependencies
        run: |
          echo "📦 Установка Python зависимостей..."
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.36
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          echo "✅ Python зависимости установлены"
      
      - name: 💾 Cache Buildozer
        if: github.event.inputs.clean_cache != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.android
            ~/.ccache
          key: ${{ runner.os }}-buildozer-arm64-${{ hashFiles('buildozer.spec', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-arm64-
            ${{ runner.os }}-buildozer-
      
      - name: 🧹 Clean cache (if requested)
        if: github.event.inputs.clean_cache == 'true'
        run: |
          echo "🧹 Очистка кэша..."
          rm -rf ~/.buildozer
          rm -rf ~/.android
          rm -rf ~/.ccache
          echo "✅ Кэш очищен"
      
      - name: 📥 Download and setup real sdkmanager
        run: |
          echo "📥 Скачивание настоящего sdkmanager..."
          
          # Создаем папки
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
          
          # Скачиваем command line tools
          cd ~/.buildozer/android/platform/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip
          mv cmdline-tools latest 2>/dev/null || true
          
          # Проверяем
          if [ -f ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager ]; then
            echo "✅ Настоящий sdkmanager скачан"
            chmod +x ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager
          else
            echo "❌ Ошибка скачивания sdkmanager"
            exit 1
          fi
          
          # Добавляем в PATH
          echo "export PATH=\$PATH:~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin" >> ~/.bashrc
          export PATH=$PATH:~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
      
      - name: 🤖 Accept Android licenses with real sdkmanager
        run: |
          echo "🤖 Принятие лицензий Android SDK через настоящий sdkmanager..."
          
          export PATH=$PATH:~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
          export ANDROID_HOME=~/.buildozer/android/platform/android-sdk
          
          SDKMANAGER=~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager
          
          # Принимаем лицензии
          echo "📋 Принимаем все лицензии..."
          yes | $SDKMANAGER --licenses || true
          
          # Создаем файлы лицензий вручную
          mkdir -p ~/.android/licenses
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" >> ~/.android/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> ~/.android/licenses/android-sdk-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> ~/.android/licenses/android-sdk-license
          
          echo "✅ Лицензии приняты"
      
      - name: 🔧 Install SDK components with real sdkmanager
        run: |
          echo "🔧 Установка компонентов SDK с помощью настоящего sdkmanager..."
          
          export PATH=$PATH:~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
          export ANDROID_HOME=~/.buildozer/android/platform/android-sdk
          
          SDKMANAGER=~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager
          
          # Устанавливаем необходимые компоненты
          echo "📥 Устанавливаем platform-tools..."
          $SDKMANAGER "platform-tools" || true
          
          echo "📥 Устанавливаем platforms;android-33..."
          $SDKMANAGER "platforms;android-33" || true
          
          echo "📥 Устанавливаем build-tools;33.0.0..."
          $SDKMANAGER "build-tools;33.0.0" || true
          
          # Проверяем установку
          echo "✅ Проверка установленных компонентов:"
          $SDKMANAGER --list | grep -E "platform-tools|build-tools;33|platforms;android-33" || true
          
          # Создаем символическую ссылку для совместимости с buildozer
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
          ln -sf $SDKMANAGER ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
          
          # Проверяем наличие build-tools
          if [ -d ~/.buildozer/android/platform/android-sdk/build-tools/33.0.0 ]; then
            echo "✅ build-tools 33.0.0 успешно установлены"
          else
            echo "⚠️ build-tools не установлены, создаем заглушки"
            mkdir -p ~/.buildozer/android/platform/android-sdk/build-tools/33.0.0
            for tool in aapt aidl dexd8 d8 dx llvm-rs-cc; do
              touch ~/.buildozer/android/platform/android-sdk/build-tools/33.0.0/$tool
              chmod +x ~/.buildozer/android/platform/android-sdk/build-tools/33.0.0/$tool
            done
          fi
          
          echo "✅ Компоненты SDK установлены"
      
      - name: 🏗️ Build APK with Buildozer
        id: build
        run: |
          echo "🏗️ Начинаем сборку APK (только arm64-v8a)..."
          echo "📱 Приложение: Roguelike Adventure"
          echo "📦 Версия: ${{ github.event.inputs.version || '0.1.3' }}"
          
          # Устанавливаем переменные окружения
          export PATH=$PATH:~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin:~/.buildozer/android/platform/android-sdk/platform-tools
          export ANDROID_HOME=~/.buildozer/android/platform/android-sdk
          export ANDROID_SDK_ROOT=~/.buildozer/android/platform/android-sdk
          export ANDROID_NDK_HOME=~/.buildozer/android/platform/android-ndk-r23b
          export NDK_HOME=~/.buildozer/android/platform/android-ndk-r23b
          
          # Создаем папку для логов
          mkdir -p build_logs
          
          # Запускаем сборку
          buildozer android debug 2>&1 | tee build_logs/build.log
          
          # Проверяем наличие APK
          APK_FILE=$(find bin -name "*.apk" 2>/dev/null | head -n 1)
          
          if [ -n "$APK_FILE" ]; then
            echo "✅ APK найден!"
            echo "apk_file=$APK_FILE" >> $GITHUB_OUTPUT
          else
            echo "⚠️ APK не найден в bin, проверяем другие папки..."
            APK_FILE=$(find ~/.buildozer -name "*.apk" 2>/dev/null | head -n 1)
            if [ -n "$APK_FILE" ]; then
              echo "✅ APK найден в .buildozer!"
              echo "apk_file=$APK_FILE" >> $GITHUB_OUTPUT
            else
              echo "❌ APK не найден!"
              echo "📋 Последние 50 строк лога:"
              tail -n 50 build_logs/build.log
              exit 1
            fi
          fi
      
      - name: 🔍 Find and prepare APK
        if: steps.build.outputs.apk_file != ''
        id: apk
        run: |
          APK_FILE="${{ steps.build.outputs.apk_file }}"
          
          if [ ! -f "$APK_FILE" ]; then
            APK_FILE=$(find . -name "*.apk" | head -n 1)
          fi
          
          VERSION="${{ github.event.inputs.version || '0.1.3' }}"
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          FILENAME="Roguelike-Adventure-v${VERSION}-arm64-${SHORT_SHA}.apk"
          
          cp "$APK_FILE" "./$FILENAME"
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "size=$(ls -lh $FILENAME | awk '{print $5}')" >> $GITHUB_OUTPUT
      
      - name: 📤 Upload APK
        if: steps.apk.outputs.filename != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.filename }}
          path: ./${{ steps.apk.outputs.filename }}
          if-no-files-found: error
          retention-days: 90
      
      - name: 📊 Build Summary
        if: always()
        run: |
          echo "## 📱 Результат сборки (arm64-v8a)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -n "${{ steps.apk.outputs.filename }}" ]; then
            echo "✅ **APK успешно собран!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📦 Файл" >> $GITHUB_STEP_SUMMARY
            echo "- **Имя:** \`${{ steps.apk.outputs.filename }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Размер:** ${{ steps.apk.outputs.size }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Архитектура:** arm64-v8a (64-бит)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📥 Скачать" >> $GITHUB_STEP_SUMMARY
            echo "APK доступен в разделе **Artifacts** выше ☝️" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Сборка не удалась**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📋 Лог ошибки" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -n 20 build_logs/build.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
