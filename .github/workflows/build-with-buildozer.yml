name: 🏗️ Сборка APK (только arm64-v8a)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      version:
        description: '📦 Версия приложения'
        required: false
        default: '0.1.3'
      clean_cache:
        description: '🧹 Очистить кэш перед сборкой'
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: 📱 Сборка APK (arm64-v8a)
    runs-on: ubuntu-22.04
    timeout-minutes: 40  # Меньше времени, так как только одна архитектура
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            buildozer.spec
      
      - name: 📦 Install system dependencies
        run: |
          echo "📦 Установка системных зависимостей..."
          sudo apt update
          sudo apt install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            python3-venv \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev \
            wget \
            curl \
            build-essential \
            ccache \
            patchelf \
            && echo "✅ Системные зависимости установлены"
      
      - name: 📦 Install Python dependencies
        run: |
          echo "📦 Установка Python зависимостей..."
          pip install --upgrade pip setuptools wheel
          pip install buildozer cython==0.29.36
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          echo "✅ Python зависимости установлены"
      
      - name: 💾 Cache Buildozer
        if: github.event.inputs.clean_cache != 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.android
            ~/.ccache
          key: ${{ runner.os }}-buildozer-arm64-${{ hashFiles('buildozer.spec', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-arm64-
            ${{ runner.os }}-buildozer-
      
      - name: 🧹 Clean cache (if requested)
        if: github.event.inputs.clean_cache == 'true'
        run: |
          echo "🧹 Очистка кэша..."
          rm -rf ~/.buildozer
          rm -rf ~/.android
          rm -rf ~/.ccache
          echo "✅ Кэш очищен"
      
      - name: 🔧 Fix common Buildozer issues
        run: |
          echo "🔧 Применяем предварительные исправления..."
          
          # Исправление для лицензий SDK
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          
          # Исправление для build-tools
          mkdir -p ~/.buildozer/android/platform/android-sdk/build-tools
          
          # Исправление для NDK
          rm -rf ~/.buildozer/android/platform/android-ndk-* 2>/dev/null || true
          
          # Исправление для ccache
          ccache -M 5G
          ccache -s
          
          echo "✅ Предварительные исправления применены"
      
      - name: 🤖 Accept Android licenses automatically
        run: |
          echo "🤖 Автоматическое принятие лицензий Android SDK..."
          
          # Создаем скрипт для автоматического принятия лицензий
          cat > accept_licenses.sh << 'EOF'
          #!/bin/bash
          while IFS= read -r line; do
            echo "$line"
            if [[ "$line" == *"Accept? (y/N):"* ]]; then
              echo "y"
            fi
          done < "${1:-/dev/stdin}"
          EOF
          
          chmod +x accept_licenses.sh
          
          # Устанавливаем sdkmanager если его нет
          if [ ! -f ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager ]; then
            echo "📥 Скачиваем command line tools..."
            mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
            unzip -q commandlinetools-linux-9477386_latest.zip -d ~/.buildozer/android/platform/android-sdk/cmdline-tools
            mv ~/.buildozer/android/platform/android-sdk/cmdline-tools/cmdline-tools ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          fi
          
          # Принимаем лицензии
          yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
          
          echo "✅ Лицензии приняты"
      
      - name: 🔧 Verify Android SDK components
        run: |
          echo "🔧 Проверка компонентов Android SDK..."
          
          export ANDROID_HOME=~/.buildozer/android/platform/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # Устанавливаем нужные компоненты если их нет
          if [ ! -d "$ANDROID_HOME/platforms/android-33" ]; then
            echo "📥 Устанавливаем Android SDK Platform 33..."
            yes | sdkmanager "platforms;android-33" || true
          fi
          
          if [ ! -d "$ANDROID_HOME/build-tools/33.0.0" ]; then
            echo "📥 Устанавливаем build-tools 33.0.0..."
            yes | sdkmanager "build-tools;33.0.0" || true
          fi
          
          # Проверяем наличие aidl
          if [ -f "$ANDROID_HOME/build-tools/33.0.0/aidl" ]; then
            echo "✅ aidl найден"
            ln -sf "$ANDROID_HOME/build-tools/33.0.0/aidl" "$ANDROID_HOME/build-tools/aidl" || true
          fi
          
          echo "✅ Проверка завершена"
      
      - name: 🏗️ Build APK with Buildozer
        id: build
        run: |
          echo "🏗️ Начинаем сборку APK (только arm64-v8a)..."
          echo "📱 Приложение: Roguelike Adventure"
          echo "📦 Версия: ${{ github.event.inputs.version || '0.1.3' }}"
          
          # Создаем папку для логов
          mkdir -p build_logs
          
          # Запускаем сборку с таймаутом
          timeout 35m buildozer android debug 2>&1 | tee build_logs/build.log
          
          # Проверяем наличие APK
          APK_FILE=$(find bin -name "*.apk" 2>/dev/null | head -n 1)
          
          if [ -n "$APK_FILE" ]; then
            echo "✅ APK найден!"
            echo "apk_file=$APK_FILE" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "❌ APK не найден!"
            echo "📋 Последние 50 строк лога:"
            tail -n 50 build_logs/build.log
            exit 1
          fi
      
      - name: 🔍 Find and prepare APK
        if: steps.build.outputs.apk_file != ''
        id: apk
        run: |
          APK_FILE="${{ steps.build.outputs.apk_file }}"
          
          if [ ! -f "$APK_FILE" ]; then
            APK_FILE=$(find bin -name "*.apk" | head -n 1)
          fi
          
          VERSION="${{ github.event.inputs.version || '0.1.3' }}"
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          FILENAME="Roguelike-Adventure-v${VERSION}-arm64-${SHORT_SHA}.apk"
          
          cp "$APK_FILE" "./$FILENAME"
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "size=$(ls -lh $FILENAME | awk '{print $5}')" >> $GITHUB_OUTPUT
      
      - name: 📤 Upload APK
        if: steps.apk.outputs.filename != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.filename }}
          path: ./${{ steps.apk.outputs.filename }}
          if-no-files-found: error
          retention-days: 90
      
      - name: 📊 Build Summary
        if: always()
        run: |
          echo "## 📱 Результат сборки (arm64-v8a)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -n "${{ steps.apk.outputs.filename }}" ]; then
            echo "✅ **APK успешно собран!**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📦 Файл" >> $GITHUB_STEP_SUMMARY
            echo "- **Имя:** \`${{ steps.apk.outputs.filename }}\`" >> $GITHUB_STEP_SUMMARY
            echo "- **Размер:** ${{ steps.apk.outputs.size }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Архитектура:** arm64-v8a (64-бит)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📥 Скачать" >> $GITHUB_STEP_SUMMARY
            echo "APK доступен в разделе **Artifacts** выше ☝️" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Сборка не удалась**" >> $GITHUB_STEP_SUMMARY
          fi
