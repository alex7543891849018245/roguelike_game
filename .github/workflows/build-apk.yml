name: 🏗️ Сборка Android APK

env:
  APP_NAME: "Roguelike Adventure"
  PACKAGE_NAME: "org.alexstudiocode.roguelike"
  VERSION: "0.1.3"
  ANDROID_API: "34"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      version:
        description: '📦 Версия приложения'
        required: false
        default: '0.1.3'

jobs:
  build:
    name: 📱 Сборка APK
    runs-on: ubuntu-22.04
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
      
      - name: 💾 Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android
            /usr/local/lib/android/sdk
          key: ${{ runner.os }}-android
          restore-keys: |
            ${{ runner.os }}-android-
      
      - name: 🤖 Setup Android SDK and NDK
        run: |
          export ANDROID_HOME="/usr/local/lib/android/sdk"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          
          echo "📦 Проверка Android SDK..."
          
          # Создаем директории если нужно
          mkdir -p $ANDROID_HOME/cmdline-tools
          mkdir -p $ANDROID_HOME/licenses
          
          # Проверяем наличие command line tools
          if [ ! -d "$ANDROID_HOME/cmdline-tools/latest" ]; then
            echo "📥 Скачивание command line tools..."
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
            unzip -q commandlinetools-linux-9477386_latest.zip -d $ANDROID_HOME/cmdline-tools
            mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          fi
          
          # Добавляем в PATH
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # Принимаем лицензии
          touch $ANDROID_HOME/licenses/android-sdk-license
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_HOME/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
          
          echo "✅ Android SDK готов"
      
      - name: 🔍 Find NDK version
        id: ndk
        run: |
          ANDROID_HOME="/usr/local/lib/android/sdk"
          
          # Ищем любую установленную версию NDK
          if [ -d "$ANDROID_HOME/ndk" ]; then
            NDK_VERSIONS=$(ls -1 $ANDROID_HOME/ndk/ | sort -V)
            NDK_COUNT=$(echo "$NDK_VERSIONS" | wc -l)
            
            if [ "$NDK_COUNT" -gt 0 ]; then
              # Берем первую (самую старую/стабильную) версию
              NDK_VERSION=$(echo "$NDK_VERSIONS" | head -n 1)
              NDK_PATH="$ANDROID_HOME/ndk/$NDK_VERSION"
              
              echo "📌 Найдена версия NDK: $NDK_VERSION"
              echo "ndk_version=$NDK_VERSION" >> $GITHUB_OUTPUT
              echo "ndk_path=$NDK_PATH" >> $GITHUB_OUTPUT
              echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
              echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
              echo "$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH
            else
              echo "❌ NDK не найден!"
              exit 1
            fi
          else
            echo "❌ Папка ndk не существует!"
            exit 1
          fi
      
      - name: 📦 Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            wget curl build-essential ccache \
            libstdc++-12-dev \
            liblzma-dev \
            libbz2-dev
      
      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install python-for-android cython==0.29.36
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
      
      - name: 🔖 Set version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || env.VERSION }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 Версия: $VERSION"
      
      - name: ✅ Verify NDK
        run: |
          ANDROID_HOME="/usr/local/lib/android/sdk"
          NDK_PATH="${{ steps.ndk.outputs.ndk_path }}"
          
          echo "📁 Проверка NDK по пути: $NDK_PATH"
          
          TOOLCHAIN_PATH="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin"
          CLANG_PATH="$TOOLCHAIN_PATH/clang"
          
          if [ -f "$CLANG_PATH" ]; then
            echo "✅ Clang найден: $CLANG_PATH"
            $CLANG_PATH --version
          else
            echo "❌ Clang не найден!"
            echo "📁 Содержимое $TOOLCHAIN_PATH:"
            ls -la $TOOLCHAIN_PATH/
            exit 1
          fi
      
      - name: 🔧 Prepare bootstrap (create SDL2 source)
        run: |
          echo "🔧 Подготавливаем bootstrap для SDL2..."
          # Это создаст структуру папок с исходниками
          p4a create --bootstrap=sdl2 --requirements=kivy --arch=arm64-v8a --no-download || true
          echo "✅ Bootstrap подготовлен"
      
      - name: 🔧 Patch SDL2 source before build
        run: |
          echo "🔧 Применяем патч к исходникам SDL2..."
          
          # Путь к исходникам SDL2
          SDL2_SOURCE_DIR="$HOME/.local/share/python-for-android/build/bootstrap_builds/sdl2/jni/SDL"
          
          # Ждем пока создадутся исходники (максимум 60 секунд)
          for i in {1..30}; do
            if [ -d "$SDL2_SOURCE_DIR" ]; then
              echo "✅ Исходники SDL2 найдены"
              break
            fi
            echo "⏳ Ждем создания исходников SDL2... ($i/30)"
            sleep 2
          done
          
          # Проверяем наличие директории
          if [ ! -d "$SDL2_SOURCE_DIR" ]; then
            echo "❌ Исходники SDL2 не найдены!"
            echo "📁 Поиск всех копий SDL_androidsensor.c:"
            find "$HOME/.local/share/python-for-android" -name "SDL_androidsensor.c" 2>/dev/null || echo "Файлы не найдены"
            exit 1
          fi
          
          # Патчим файл для обеих архитектур
          SENSOR_FILES=$(find "$SDL2_SOURCE_DIR" -name "SDL_androidsensor.c" 2>/dev/null)
          
          if [ -n "$SENSOR_FILES" ]; then
            for SENSOR_FILE in $SENSOR_FILES; do
              echo "📁 Найден файл: $SENSOR_FILE"
              
              # Создаем бэкап
              cp "$SENSOR_FILE" "$SENSOR_FILE.bak"
              
              # Заменяем устаревшую функцию
              sed -i 's/ALooper_pollAll/ALooper_pollOnce/g' "$SENSOR_FILE"
              
              # Проверяем результат
              if grep -q "ALooper_pollOnce" "$SENSOR_FILE"; then
                echo "✅ Патч применен успешно для $(basename $SENSOR_FILE)"
              else
                echo "❌ Ошибка применения патча для $SENSOR_FILE"
                exit 1
              fi
            done
          else
            echo "❌ Файлы SDL_androidsensor.c не найдены!"
            echo "📁 Содержимое SDL2 source:"
            ls -la "$SDL2_SOURCE_DIR/src/sensor/android/" || echo "Директория не существует"
            exit 1
          fi
          
          echo "✅ Все патчи применены"
      
      - name: 🏗️ Build APK
        run: |
          echo "🏗️ Начинаем сборку APK..."
          echo "📱 Приложение: ${{ env.APP_NAME }}"
          echo "📦 Пакет: ${{ env.PACKAGE_NAME }}"
          
          mkdir -p build_logs
          
          ANDROID_HOME="/usr/local/lib/android/sdk"
          NDK_PATH="${{ steps.ndk.outputs.ndk_path }}"
          NDK_VERSION=$(basename $NDK_PATH)
          
          echo "📌 Используем NDK: $NDK_VERSION"
          echo "📌 Путь NDK: $NDK_PATH"
          echo "📌 SDK: $ANDROID_HOME"
          
          # Запускаем сборку
          p4a apk \
            --private . \
            --package="${{ env.PACKAGE_NAME }}" \
            --name "${{ env.APP_NAME }}" \
            --version ${{ steps.version.outputs.version }} \
            --bootstrap=sdl2 \
            --requirements="python3,kivy==2.2.1,pyjnius,android" \
            --arch=arm64-v8a \
            --arch=armeabi-v7a \
            --permission WRITE_EXTERNAL_STORAGE \
            --permission READ_EXTERNAL_STORAGE \
            --orientation=landscape \
            --sdk_dir=$ANDROID_HOME \
            --ndk_dir=$NDK_PATH \
            --ndk_version=$NDK_VERSION \
            --android_api 34 \
            --window \
            --debug \
            --verbose 2>&1 | tee build_logs/build.log
          
          echo "✅ Сборка завершена"
      
      - name: 🔍 Find APK
        id: apk
        run: |
          echo "🔍 Поиск готового APK файла..."
          
          APK_FILES=$(find . -name "*.apk" -type f | sort)
          
          if [ -z "$APK_FILES" ]; then
            echo "❌ APK не найден!"
            echo "📋 Последние 50 строк лога сборки:"
            tail -n 50 build_logs/build.log
            exit 1
          fi
          
          echo "✅ Найдено APK файлов:"
          echo "$APK_FILES" | while read file; do
            echo "   📦 $(basename $file) - $(ls -lh $file | awk '{print $5}')"
          done
          
          # Берем первый APK
          FIRST_APK=$(echo "$APK_FILES" | head -n 1)
          FILENAME="${{ env.APP_NAME }}-v${{ steps.version.outputs.version }}.apk"
          FILENAME_CLEAN=$(echo "$FILENAME" | tr ' ' '-')
          
          cp "$FIRST_APK" "./$FILENAME_CLEAN"
          echo "📦 Итоговый файл: $FILENAME_CLEAN"
          echo "filename=$FILENAME_CLEAN" >> $GITHUB_OUTPUT
          echo "size=$(ls -lh $FILENAME_CLEAN | awk '{print $5}')" >> $GITHUB_OUTPUT
      
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.filename }}
          path: ./${{ steps.apk.outputs.filename }}
          if-no-files-found: error
          retention-days: 90
          compression-level: 0
      
      - name: 📊 Build summary
        run: |
          echo "## 📱 Результат сборки" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Параметр | Значение |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Приложение** | ${{ env.APP_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Пакет** | \`${{ env.PACKAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Версия** | ${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Файл** | \`${{ steps.apk.outputs.filename }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Размер** | ${{ steps.apk.outputs.size }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Сборка успешно завершена!**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⬇️ Скачайте APK из раздела **Artifacts** выше" >> $GITHUB_STEP_SUMMARY
