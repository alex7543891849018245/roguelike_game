name: 🏗️ Сборка Android APK

env:
  APP_NAME: "Roguelike Adventure"
  PACKAGE_NAME: "org.alexstudiocode.roguelike"
  VERSION: "0.1.3"
  ANDROID_API: "34"  # Меняем на 34 (доступен по умолчанию)
  ANDROID_NDK: "25b"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      version:
        description: '📦 Версия приложения'
        required: false
        default: '0.1.3'

jobs:
  build:
    name: 📱 Сборка APK
    runs-on: ubuntu-22.04
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
      
      # Установка Android SDK компонентов
      - name: 🤖 Setup Android SDK
        run: |
          echo "📦 Установка Android SDK компонентов..."
          
          # Создаем директории
          mkdir -p $ANDROID_HOME/cmdline-tools
          mkdir -p $ANDROID_HOME/licenses
          
          # Скачиваем command line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip -d $ANDROID_HOME/cmdline-tools
          mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          
          # Принимаем лицензии
          touch $ANDROID_HOME/licenses/android-sdk-license
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_HOME/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
          
          # Добавляем в PATH
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # Устанавливаем необходимые компоненты
          echo "📦 Установка platform-tools..."
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-${{ env.ANDROID_API }}" "build-tools;34.0.0" --verbose
          
          echo "✅ Android SDK готов"
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
      
      - name: 📦 Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            wget curl build-essential ccache
      
      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install python-for-android cython
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
      
      - name: 🔖 Set version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || env.VERSION }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 Версия: $VERSION"
      
      # Устанавливаем переменные окружения для p4a
      - name: 🔧 Set Android environment
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "PATH=$PATH:/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_ENV
      
      - name: 🏗️ Build APK with python-for-android
        run: |
          echo "🏗️ Начинаем сборку APK..."
          echo "📱 Приложение: ${{ env.APP_NAME }}"
          echo "📦 Пакет: ${{ env.PACKAGE_NAME }}"
          
          # Создаем временную папку для логов
          mkdir -p build_logs
          
          # Запускаем сборку с явным указанием API
          p4a apk \
            --private . \
            --package="${{ env.PACKAGE_NAME }}" \
            --name "${{ env.APP_NAME }}" \
            --version ${{ steps.version.outputs.version }} \
            --bootstrap=sdl2 \
            --requirements="python3,kivy==2.2.1,pyjnius,android" \
            --arch=arm64-v8a \
            --arch=armeabi-v7a \
            --permission WRITE_EXTERNAL_STORAGE \
            --permission READ_EXTERNAL_STORAGE \
            --orientation=landscape \
            --sdk_dir=/usr/local/lib/android/sdk \
            --ndk_dir=/usr/local/lib/android/sdk/ndk/25.2.9519653 \
            --android_api 34 \
            --window \
            --debug \
            --verbose 2>&1 | tee build_logs/build.log
          
          echo "✅ Сборка завершена"
      
      - name: 🔍 Find and prepare APK
        id: apk
        run: |
          echo "🔍 Поиск готового APK файла..."
          
          APK_FILES=$(find . -name "*.apk" -type f)
          
          if [ -z "$APK_FILES" ]; then
            echo "❌ APK файл не найден!"
            echo "📋 Логи сборки:"
            cat build_logs/build.log
            exit 1
          fi
          
          FIRST_APK=$(echo "$APK_FILES" | head -n 1)
          FILENAME="${{ env.APP_NAME }}-v${{ steps.version.outputs.version }}.apk"
          FILENAME_CLEAN=$(echo "$FILENAME" | tr ' ' '-')
          
          cp "$FIRST_APK" "./$FILENAME_CLEAN"
          echo "📦 APK готов: $FILENAME_CLEAN"
          echo "filename=$FILENAME_CLEAN" >> $GITHUB_OUTPUT
      
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.filename }}
          path: ./${{ steps.apk.outputs.filename }}
          retention-days: 90
