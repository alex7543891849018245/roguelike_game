name: 🏗️ Сборка Android APK

env:
  APP_NAME: "Roguelike Adventure"
  PACKAGE_NAME: "org.alexstudiocode.roguelike"
  VERSION: "0.1.3"
  ANDROID_API: "34"
  ANDROID_NDK_VERSION: "25.2.9519653"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      version:
        description: '📦 Версия приложения'
        required: false
        default: '0.1.3'

jobs:
  build:
    name: 📱 Сборка APK
    runs-on: ubuntu-22.04
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
      
      # Кэширование Android SDK и NDK
      - name: 💾 Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android
            ~/.buildozer
            /usr/local/lib/android/sdk
          key: ${{ runner.os }}-android-${{ env.ANDROID_API }}-${{ env.ANDROID_NDK_VERSION }}
          restore-keys: |
            ${{ runner.os }}-android-
      
      # Кэширование python-for-android
      - name: 💾 Cache p4a
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/python-for-android
          key: ${{ runner.os }}-p4a-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-p4a-
      
      - name: 🤖 Setup Android SDK and NDK
        run: |
          echo "📦 Установка Android SDK и NDK..."
          
          mkdir -p $ANDROID_HOME/cmdline-tools
          mkdir -p $ANDROID_HOME/licenses
          
          # Проверяем, есть ли уже SDK
          if [ ! -d "$ANDROID_HOME/cmdline-tools/latest" ]; then
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
            unzip -q commandlinetools-linux-9477386_latest.zip -d $ANDROID_HOME/cmdline-tools
            mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
            
            # Принимаем лицензии
            touch $ANDROID_HOME/licenses/android-sdk-license
            echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_HOME/licenses/android-sdk-license
            echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
            
            export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
            
            # Устанавливаем компоненты
            yes | sdkmanager --licenses > /dev/null 2>&1 || true
            sdkmanager "platform-tools" "platforms;android-${{ env.ANDROID_API }}" "build-tools;34.0.0"
            sdkmanager "ndk;${{ env.ANDROID_NDK_VERSION }}"
          else
            echo "✅ Android SDK уже установлен"
          fi
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
      
      - name: 📦 Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            wget curl build-essential ccache \
            libstdc++-12-dev \
            liblzma-dev \
            libbz2-dev
      
      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install python-for-android cython==0.29.36
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
      
      - name: 🔖 Set version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || env.VERSION }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 Версия: $VERSION"
      
      - name: 🔧 Set Android environment
        run: |
          ANDROID_HOME="/usr/local/lib/android/sdk"
          NDK_VERSION="${{ env.ANDROID_NDK_VERSION }}"
          NDK_PATH="$ANDROID_HOME/ndk/$NDK_VERSION"
          
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH
      
      - name: ✅ Verify NDK
        run: |
          NDK_PATH="/usr/local/lib/android/sdk/ndk/${{ env.ANDROID_NDK_VERSION }}"
          if [ -f "$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/clang" ]; then
            echo "✅ Clang найден"
          else
            echo "❌ Clang не найден!"
            exit 1
          fi
      
      - name: 🏗️ Build APK
        run: |
          echo "🏗️ Начинаем сборку APK..."
          echo "📱 Приложение: ${{ env.APP_NAME }}"
          echo "📦 Пакет: ${{ env.PACKAGE_NAME }}"
          
          mkdir -p build_logs
          
          NDK_PATH="/usr/local/lib/android/sdk/ndk/${{ env.ANDROID_NDK_VERSION }}"
          
          p4a apk \
            --private . \
            --package="${{ env.PACKAGE_NAME }}" \
            --name "${{ env.APP_NAME }}" \
            --version ${{ steps.version.outputs.version }} \
            --bootstrap=sdl2 \
            --requirements="python3,kivy==2.2.1,pyjnius,android" \
            --arch=arm64-v8a \
            --arch=armeabi-v7a \
            --permission WRITE_EXTERNAL_STORAGE \
            --permission READ_EXTERNAL_STORAGE \
            --orientation=landscape \
            --sdk_dir=/usr/local/lib/android/sdk \
            --ndk_dir=$NDK_PATH \
            --android_api 34 \
            --window \
            --debug \
            --verbose 2>&1 | tee build_logs/build.log
          
          echo "✅ Сборка завершена"
      
      - name: 🔍 Find APK
        id: apk
        run: |
          APK_FILES=$(find . -name "*.apk" -type f)
          
          if [ -z "$APK_FILES" ]; then
            echo "❌ APK не найден!"
            cat build_logs/build.log
            exit 1
          fi
          
          FIRST_APK=$(echo "$APK_FILES" | head -n 1)
          FILENAME="${{ env.APP_NAME }}-v${{ steps.version.outputs.version }}.apk"
          FILENAME_CLEAN=$(echo "$FILENAME" | tr ' ' '-')
          
          cp "$FIRST_APK" "./$FILENAME_CLEAN"
          echo "📦 APK готов: $FILENAME_CLEAN"
          echo "filename=$FILENAME_CLEAN" >> $GITHUB_OUTPUT
      
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.filename }}
          path: ./${{ steps.apk.outputs.filename }}
          retention-days: 90
      
      - name: 📊 Build summary
        run: |
          echo "## 📱 Результат сборки" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Параметр | Значение |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Приложение** | ${{ env.APP_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Пакет** | \`${{ env.PACKAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Версия** | ${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Файл** | \`${{ steps.apk.outputs.filename }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Сборка успешно завершена!**" >> $GITHUB_STEP_SUMMARY
