name: рЯПЧпЄП –°–±–Њ—А–Ї–∞ Android APK

env:
  APP_NAME: "Roguelike Adventure"
  PACKAGE_NAME: "org.alexstudiocode.roguelike"
  VERSION: "0.1.3"
  ANDROID_API: "34"
  # –Т–Ї–ї—О—З–∞–µ–Љ ccache –і–ї—П —Г—Б–Ї–Њ—А–µ–љ–Є—П [citation:8]
  USE_CCACHE: "1"
  CCACHE_DIR: "/home/runner/.ccache"
  CCACHE_MAXSIZE: "5G"
  # –Я–∞—А–∞–ї–ї–µ–ї—М–љ–∞—П –Ї–Њ–Љ–њ–Є–ї—П—Ж–Є—П [citation:4]
  MAKEFLAGS: "-j4"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'рЯУ¶ –Т–µ—А—Б–Є—П –њ—А–Є–ї–Њ–ґ–µ–љ–Є—П'
        required: false
        default: '0.1.3'

jobs:
  build:
    name: рЯУ± –°–±–Њ—А–Ї–∞ APK
    runs-on: ubuntu-22.04
    
    steps:
      - name: рЯУ• Checkout repository
        uses: actions/checkout@v4
      
      - name: рЯРН Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
      
      # === –Ъ–≠–®–Ш–†–Ю–Т–Р–Э–Ш–Х (–і–ї—П —Г—Б–Ї–Њ—А–µ–љ–Є—П —Б–ї–µ–і—Г—О—Й–Є—Е —Б–±–Њ—А–Њ–Ї –≤ 5-10 —А–∞–Ј) ===
      - name: рЯТЊ Cache ccache
        uses: actions/cache@v4
        with:
          path: /home/runner/.ccache
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-
      
      - name: рЯТЊ Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android
            /usr/local/lib/android/sdk
          key: ${{ runner.os }}-android-sdk-${{ env.ANDROID_API }}
          restore-keys: |
            ${{ runner.os }}-android-sdk-
      
      - name: рЯТЊ Cache p4a build
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/python-for-android/build
            ~/.local/share/python-for-android/dists
            ~/.local/share/python-for-android/packages
          key: ${{ runner.os }}-p4a-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-p4a-
      
      # === –Э–Р–°–Ґ–†–Ю–Щ–Ъ–Р CCACHE [citation:8] ===
      - name: рЯФІ Setup ccache
        run: |
          sudo apt install -y ccache
          ccache -M 5G
          ccache -s
          echo "вЬЕ ccache –љ–∞—Б—В—А–Њ–µ–љ, –Љ–∞–Ї—Б–Є–Љ–∞–ї—М–љ—Л–є —А–∞–Ј–Љ–µ—А: 5G"
      
      - name: рЯ§Ц Setup Android SDK and NDK
        run: |
          export ANDROID_HOME="/usr/local/lib/android/sdk"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          
          echo "рЯУ¶ –Я—А–Њ–≤–µ—А–Ї–∞ Android SDK..."
          
          # –°–Њ–Ј–і–∞–µ–Љ –і–Є—А–µ–Ї—В–Њ—А–Є–Є –µ—Б–ї–Є –љ—Г–ґ–љ–Њ
          mkdir -p $ANDROID_HOME/cmdline-tools
          mkdir -p $ANDROID_HOME/licenses
          
          # –Я—А–Њ–≤–µ—А—П–µ–Љ –љ–∞–ї–Є—З–Є–µ command line tools
          if [ ! -d "$ANDROID_HOME/cmdline-tools/latest" ]; then
            echo "рЯУ• –°–Ї–∞—З–Є–≤–∞–љ–Є–µ command line tools..."
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
            unzip -q commandlinetools-linux-9477386_latest.zip -d $ANDROID_HOME/cmdline-tools
            mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          fi
          
          # –Ф–Њ–±–∞–≤–ї—П–µ–Љ –≤ PATH
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # –Я—А–Є–љ–Є–Љ–∞–µ–Љ –ї–Є—Ж–µ–љ–Ј–Є–Є
          touch $ANDROID_HOME/licenses/android-sdk-license
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_HOME/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
          
          echo "вЬЕ Android SDK –≥–Њ—В–Њ–≤"
      
      - name: рЯФН Find NDK version
        id: ndk
        run: |
          ANDROID_HOME="/usr/local/lib/android/sdk"
          
          # –Ш—Й–µ–Љ –ї—О–±—Г—О —Г—Б—В–∞–љ–Њ–≤–ї–µ–љ–љ—Г—О –≤–µ—А—Б–Є—О NDK
          if [ -d "$ANDROID_HOME/ndk" ]; then
            NDK_VERSIONS=$(ls -1 $ANDROID_HOME/ndk/ | sort -V)
            NDK_COUNT=$(echo "$NDK_VERSIONS" | wc -l)
            
            if [ "$NDK_COUNT" -gt 0 ]; then
              # –С–µ—А–µ–Љ –њ–µ—А–≤—Г—О (—Б–∞–Љ—Г—О —Б—В–∞—А—Г—О/—Б—В–∞–±–Є–ї—М–љ—Г—О) –≤–µ—А—Б–Є—О
              NDK_VERSION=$(echo "$NDK_VERSIONS" | head -n 1)
              NDK_PATH="$ANDROID_HOME/ndk/$NDK_VERSION"
              
              echo "рЯУМ –Э–∞–є–і–µ–љ–∞ –≤–µ—А—Б–Є—П NDK: $NDK_VERSION"
              echo "ndk_version=$NDK_VERSION" >> $GITHUB_OUTPUT
              echo "ndk_path=$NDK_PATH" >> $GITHUB_OUTPUT
              echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
              echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
              echo "$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH
            else
              echo "вЭМ NDK –љ–µ –љ–∞–є–і–µ–љ!"
              exit 1
            fi
          else
            echo "вЭМ –Я–∞–њ–Ї–∞ ndk –љ–µ —Б—Г—Й–µ—Б—В–≤—Г–µ—В!"
            exit 1
          fi
      
      - name: рЯУ¶ Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            wget curl build-essential ccache \
            libstdc++-12-dev \
            liblzma-dev \
            libbz2-dev \
            patchelf  # –і–ї—П –Њ–њ—В–Є–Љ–Є–Ј–∞—Ж–Є–Є [citation:2]
      
      - name: рЯУ¶ Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install python-for-android cython==0.29.36
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
      
      - name: рЯФЦ Set version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || env.VERSION }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "рЯУМ –Т–µ—А—Б–Є—П: $VERSION"
      
      - name: вЬЕ Verify NDK
        run: |
          ANDROID_HOME="/usr/local/lib/android/sdk"
          NDK_PATH="${{ steps.ndk.outputs.ndk_path }}"
          
          echo "рЯУБ –Я—А–Њ–≤–µ—А–Ї–∞ NDK –њ–Њ –њ—Г—В–Є: $NDK_PATH"
          
          TOOLCHAIN_PATH="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin"
          CLANG_PATH="$TOOLCHAIN_PATH/clang"
          
          if [ -f "$CLANG_PATH" ]; then
            echo "вЬЕ Clang –љ–∞–є–і–µ–љ: $CLANG_PATH"
            $CLANG_PATH --version
          else
            echo "вЭМ Clang –љ–µ –љ–∞–є–і–µ–љ!"
            echo "рЯУБ –°–Њ–і–µ—А–ґ–Є–Љ–Њ–µ $TOOLCHAIN_PATH:"
            ls -la $TOOLCHAIN_PATH/
            exit 1
          fi
      
      - name: рЯФІ Prepare bootstrap with API 34
        run: |
          echo "рЯФІ –Я–Њ–і–≥–Њ—В–∞–≤–ї–Є–≤–∞–µ–Љ bootstrap –і–ї—П SDL2 —Б API 34..."
          
          ANDROID_HOME="/usr/local/lib/android/sdk"
          NDK_PATH="${{ steps.ndk.outputs.ndk_path }}"
          NDK_VERSION=$(basename $NDK_PATH)
          
          echo "рЯУМ –Ш—Б–њ–Њ–ї—М–Ј—Г–µ–Љ SDK: $ANDROID_HOME"
          echo "рЯУМ –Ш—Б–њ–Њ–ї—М–Ј—Г–µ–Љ NDK: $NDK_PATH"
          echo "рЯУМ API: ${{ env.ANDROID_API }}"
          
          # –°–Њ–Ј–і–∞–µ–Љ bootstrap —Б –њ—А–∞–≤–Є–ї—М–љ—Л–Љ API
          p4a create \
            --bootstrap=sdl2 \
            --requirements="python3,kivy" \
            --arch=arm64-v8a \
            --sdk_dir=$ANDROID_HOME \
            --ndk_dir=$NDK_PATH \
            --ndk_version=$NDK_VERSION \
            --android_api ${{ env.ANDROID_API }} \
            --no-download || echo "вЪ†пЄП Bootstrap —Б–Њ–Ј–і–∞–љ —Б –њ—А–µ–і—Г–њ—А–µ–ґ–і–µ–љ–Є—П–Љ–Є (—Н—В–Њ –љ–Њ—А–Љ–∞–ї—М–љ–Њ)"
          
          echo "вЬЕ –Ъ–Њ–Љ–∞–љ–і–∞ create –≤—Л–њ–Њ–ї–љ–µ–љ–∞"
          
          # –Ц–і–µ–Љ —Б–Њ–Ј–і–∞–љ–Є—П —Д–∞–є–ї–Њ–≤
          sleep 5
      
      # === –£–Э–Ш–Т–Х–†–°–Р–Ы–ђ–Э–Ђ–Щ –Я–Р–Ґ–І–Х–† –Ф–Ы–ѓ –Т–°–Х–• –Ш–Ч–Т–Х–°–Ґ–Э–Ђ–• –Ю–®–Ш–С–Ю–Ъ ===
      - name: рЯФІ Apply all necessary patches for NDK 27+
        run: |
          echo "рЯФІ –Я—А–Є–Љ–µ–љ—П–µ–Љ –≤—Б–µ –љ–µ–Њ–±—Е–Њ–і–Є–Љ—Л–µ –њ–∞—В—З–Є –і–ї—П —Б–Њ–≤–Љ–µ—Б—В–Є–Љ–Њ—Б—В–Є —Б NDK 27+..."
          
          P4A_DIR="$HOME/.local/share/python-for-android"
          
          # –§—Г–љ–Ї—Ж–Є—П –і–ї—П –њ–∞—В—З–∞ —Д–∞–є–ї–∞ —Б –њ—А–Њ–≤–µ—А–Ї–Њ–є
          patch_file() {
            local file=$1
            local pattern=$2
            local replacement=$3
            local description=$4
            
            if [ -f "$file" ]; then
              echo "рЯУБ –Я–∞—В—З–Є–Љ: $description - $(basename $file)"
              cp "$file" "$file.bak"
              sed -i "s/$pattern/$replacement/g" "$file"
              if grep -q "$replacement" "$file"; then
                echo "  вЬЕ –£—Б–њ–µ—И–љ–Њ"
                return 0
              else
                echo "  вЪ†пЄП –Т–Њ–Ј–Љ–Њ–ґ–љ–Њ –њ–∞—В—З –љ–µ —Б—А–∞–±–Њ—В–∞–ї"
                return 1
              fi
            fi
            return 1
          }
          
          # === 1. –Я–Р–Ґ–І –Ф–Ы–ѓ SDL2 (–Њ—И–Є–±–Ї–∞ ALooper_pollAll) ===
          echo ""
          echo "рЯУМ [1/5] –Я–∞—В—З–Є–Љ SDL2 (ALooper_pollAll вЖТ ALooper_pollOnce)..."
          find "$P4A_DIR" -name "SDL_androidsensor.c" 2>/dev/null | while read file; do
            patch_file "$file" "ALooper_pollAll" "ALooper_pollOnce" "SDL2 sensor"
          done
          
          # === 2. –Я–Р–Ґ–І –Ф–Ы–ѓ HARFBUZZ (–Њ—И–Є–±–Ї–∞ –њ—А–Є–≤–µ–і–µ–љ–Є—П —В–Є–њ–Њ–≤) ===
          echo ""
          echo "рЯУМ [2/5] –Я–∞—В—З–Є–Љ harfbuzz (–Є—Б–њ—А–∞–≤–ї–µ–љ–Є–µ –њ—А–Є–≤–µ–і–µ–љ–Є—П —В–Є–њ–Њ–≤)..."
          find "$P4A_DIR" -name "hb-ft.cc" -o -name "hb-ft.c" 2>/dev/null | while read file; do
            echo "рЯУБ –Э–∞–є–і–µ–љ: $file"
            cp "$file" "$file.bak"
            # –Ш—Б–њ—А–∞–≤–ї—П–µ–Љ –≤—Б–µ –≤–∞—А–Є–∞–љ—В—Л –њ—А–Є–≤–µ–і–µ–љ–Є—П —В–Є–њ–Њ–≤
            sed -i 's/(FT_Generic_Finalizer) hb_ft_face_finalize/(void(*)(void*)) hb_ft_face_finalize/g' "$file"
            sed -i 's/(FT_Generic_Finalizer) _release_blob/(void(*)(void*)) _release_blob/g' "$file"
            # –Ф–Њ–±–∞–≤–ї—П–µ–Љ –њ–Њ–і–∞–≤–ї–µ–љ–Є–µ –њ—А–µ–і—Г–њ—А–µ–ґ–і–µ–љ–Є—П –≤ –љ–∞—З–∞–ї–Њ —Д–∞–є–ї–∞
            if ! grep -q "pragma GCC diagnostic" "$file"; then
              sed -i '1i#pragma GCC diagnostic ignored "-Wcast-function-type"' "$file"
            fi
            echo "  вЬЕ –Я–∞—В—З –њ—А–Є–Љ–µ–љ–µ–љ"
          done
          
          # === 3. –Я–Р–Ґ–І –Ф–Ы–ѓ OPENSSL (–µ—Б–ї–Є –±—Г–і–µ—В –Њ—И–Є–±–Ї–∞) ===
          echo ""
          echo "рЯУМ [3/5] –Я–∞—В—З–Є–Љ openssl (–µ—Б–ї–Є –љ—Г–ґ–љ–Њ)..."
          find "$P4A_DIR" -name "openssl" -type d 2>/dev/null | while read dir; do
            if [ -f "$dir/Configurations/15-android.conf" ]; then
              echo "рЯУБ –Э–∞–є–і–µ–љ–∞ –Ї–Њ–љ—Д–Є–≥—Г—А–∞—Ж–Є—П openssl"
              cp "$dir/Configurations/15-android.conf" "$dir/Configurations/15-android.conf.bak"
              # –Ф–Њ–±–∞–≤–ї—П–µ–Љ –њ–Њ–і–і–µ—А–ґ–Ї—Г –љ–Њ–≤—Л—Е NDK
              sed -i 's/-D__ANDROID_API__=$android_api/-D__ANDROID_MIN_SDK_VERSION__=$android_api/g' "$dir/Configurations/15-android.conf"
              echo "  вЬЕ –Я–∞—В—З openssl –њ—А–Є–Љ–µ–љ–µ–љ"
            fi
          done
          
          # === 4. –Я–Р–Ґ–І –Ф–Ы–ѓ SQLITE3 (–µ—Б–ї–Є –±—Г–і–µ—В –Њ—И–Є–±–Ї–∞) ===
          echo ""
          echo "рЯУМ [4/5] –Я–∞—В—З–Є–Љ sqlite3 (–µ—Б–ї–Є –љ—Г–ґ–љ–Њ)..."
          find "$P4A_DIR" -name "sqlite3.c" 2>/dev/null | while read file; do
            if grep -q "sqlite3_os_init" "$file"; then
              echo "рЯУБ –Э–∞–є–і–µ–љ sqlite3: $file"
              cp "$file" "$file.bak"
              # –Ш—Б–њ—А–∞–≤–ї—П–µ–Љ –≤–Њ–Ј–Љ–Њ–ґ–љ—Л–µ –њ—А–Њ–±–ї–µ–Љ—Л —Б NDK
              sed -i 's/#ifdef __ANDROID__/#if defined(__ANDROID__) \&\& defined(SQLITE_ENABLE_ICU)/g' "$file"
              echo "  вЬЕ –Я–∞—В—З sqlite3 –њ—А–Є–Љ–µ–љ–µ–љ"
            fi
          done
          
          # === 5. –Я–Р–Ґ–І –Ф–Ы–ѓ –С–Ю–†–ђ–С–Ђ –° HOST-–Ч–Р–У–†–ѓ–Ч–Э–Х–Э–Ш–Х–Ь [citation:2] ===
          echo ""
          echo "рЯУМ [5/5] –Я–∞—В—З–Є–Љ recipes –і–ї—П –њ—А–µ–і–Њ—В–≤—А–∞—Й–µ–љ–Є—П host-–Ј–∞–≥—А—П–Ј–љ–µ–љ–Є—П..."
          
          # –Я–∞—В—З–Є–Љ –≤—Б–µ —А–µ—Ж–µ–њ—В—Л, –Ї–Њ—В–Њ—А—Л–µ –Љ–Њ–≥—Г—В –Є—Б–њ–Њ–ї—М–Ј–Њ–≤–∞—В—М —Е–Њ—Б—В-–±–Є–±–ї–Є–Њ—В–µ–Ї–Є
          find "$P4A_DIR/build/other_builds" -name "Makefile" 2>/dev/null | while read makefile; do
            # –Я—А–Њ–≤–µ—А—П–µ–Љ, –љ–µ —Б—Б—Л–ї–∞–µ—В—Б—П –ї–Є Makefile –љ–∞ /usr/include
            if grep -q "\-I/usr/include" "$makefile"; then
              echo "рЯУБ –Э–∞–є–і–µ–љ Makefile —Б host-–њ—Г—В—П–Љ–Є: $makefile"
              cp "$makefile" "$makefile.bak"
              sed -i 's|-I/usr/include|-I$(ANDROID_NDK_HOME)/sysroot/usr/include|g' "$makefile"
              echo "  вЬЕ –Ш—Б–њ—А–∞–≤–ї–µ–љ—Л –њ—Г—В–Є include"
            fi
          done
          
          echo ""
          echo "вЬЕ –Т—Б–µ –њ–∞—В—З–Є –њ—А–Є–Љ–µ–љ–µ–љ—Л!"
          echo "рЯУК –°—В–∞—В–Є—Б—В–Є–Ї–∞ ccache:"
          ccache -s
      
      # === –Ю–І–Ш–°–Ґ–Ъ–Р –Ъ–≠–®–Р –Х–°–Ы–Ш –Э–£–Ц–Э–Ю [citation:7][citation:9] ===
      - name: рЯІє Optional cache cleanup (if build fails)
        if: failure()
        run: |
          echo "вЪ†пЄП –°–±–Њ—А–Ї–∞ —Г–њ–∞–ї–∞, –Њ—З–Є—Й–∞–µ–Љ –њ—А–Њ–±–ї–µ–Љ–љ—Л–µ –Ї—Н—И–Є..."
          # –Ю—З–Є—Й–∞–µ–Љ —В–Њ–ї—М–Ї–Њ –Ї–Њ–љ–Ї—А–µ—В–љ—Л–µ –њ–∞–њ–Ї–Є, —З—В–Њ–±—Л –љ–µ —В–µ—А—П—В—М –≤–µ—Б—М –њ—А–Њ–≥—А–µ—Б—Б
          rm -rf ~/.local/share/python-for-android/build/other_builds/*/arm64-v8a
          rm -rf ~/.local/share/python-for-android/build/other_builds/*/armeabi-v7a
          echo "вЬЕ –Ъ—Н—И –Њ—З–Є—Й–µ–љ, —Б–ї–µ–і—Г—О—Й–∞—П —Б–±–Њ—А–Ї–∞ –љ–∞—З–љ–µ—В—Б—П —Б —З–Є—Б—В–Њ–≥–Њ —Б–Њ—Б—В–Њ—П–љ–Є—П"
      
      - name: рЯПЧпЄП Build APK
        run: |
          echo "рЯПЧпЄП –Э–∞—З–Є–љ–∞–µ–Љ —Б–±–Њ—А–Ї—Г APK..."
          echo "рЯУ± –Я—А–Є–ї–Њ–ґ–µ–љ–Є–µ: ${{ env.APP_NAME }}"
          echo "рЯУ¶ –Я–∞–Ї–µ—В: ${{ env.PACKAGE_NAME }}"
          
          mkdir -p build_logs
          
          ANDROID_HOME="/usr/local/lib/android/sdk"
          NDK_PATH="${{ steps.ndk.outputs.ndk_path }}"
          NDK_VERSION=$(basename $NDK_PATH)
          
          echo "рЯУМ –Ш—Б–њ–Њ–ї—М–Ј—Г–µ–Љ NDK: $NDK_VERSION"
          echo "рЯУМ –Я—Г—В—М NDK: $NDK_PATH"
          echo "рЯУМ SDK: $ANDROID_HOME"
          echo "рЯУМ API: ${{ env.ANDROID_API }}"
          echo "рЯУМ ccache: $(ccache -s | grep "cache hit" || true)"
          
          # –Ч–∞–њ—Г—Б–Ї–∞–µ–Љ —Б–±–Њ—А–Ї—Г —Б —Д–ї–∞–≥–∞–Љ–Є —Г—Б–Ї–Њ—А–µ–љ–Є—П
          p4a apk \
            --private . \
            --package="${{ env.PACKAGE_NAME }}" \
            --name "${{ env.APP_NAME }}" \
            --version ${{ steps.version.outputs.version }} \
            --bootstrap=sdl2 \
            --requirements="python3,kivy==2.2.1,pyjnius,android" \
            --arch=arm64-v8a \
            --arch=armeabi-v7a \
            --permission WRITE_EXTERNAL_STORAGE \
            --permission READ_EXTERNAL_STORAGE \
            --orientation=landscape \
            --sdk_dir=$ANDROID_HOME \
            --ndk_dir=$NDK_PATH \
            --ndk_version=$NDK_VERSION \
            --android_api ${{ env.ANDROID_API }} \
            --window \
            --debug \
            --force-build \
            --verbose 2>&1 | tee build_logs/build.log
          
          # –Я—А–Њ–≤–µ—А—П–µ–Љ —А–µ–Ј—Г–ї—М—В–∞—В
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "вЬЕ –°–±–Њ—А–Ї–∞ —Г—Б–њ–µ—И–љ–Њ –Ј–∞–≤–µ—А—И–µ–љ–∞!"
          else
            echo "вЭМ –°–±–Њ—А–Ї–∞ —Г–њ–∞–ї–∞ —Б –Њ—И–Є–±–Ї–Њ–є!"
            echo "рЯУЛ –Я–Њ—Б–ї–µ–і–љ–Є–µ 50 —Б—В—А–Њ–Ї –ї–Њ–≥–∞:"
            tail -n 50 build_logs/build.log
            exit 1
          fi
      
      - name: рЯФН Find APK
        id: apk
        run: |
          echo "рЯФН –Я–Њ–Є—Б–Ї –≥–Њ—В–Њ–≤–Њ–≥–Њ APK —Д–∞–є–ї–∞..."
          
          APK_FILES=$(find . -name "*.apk" -type f | sort)
          
          if [ -z "$APK_FILES" ]; then
            echo "вЭМ APK –љ–µ –љ–∞–є–і–µ–љ!"
            echo "рЯУЛ –Ы–Њ–≥ —Б–±–Њ—А–Ї–Є:"
            cat build_logs/build.log
            exit 1
          fi
          
          echo "вЬЕ –Э–∞–є–і–µ–љ–Њ APK —Д–∞–є–ї–Њ–≤:"
          echo "$APK_FILES" | while read file; do
            echo "   рЯУ¶ $(basename $file) - $(ls -lh $file | awk '{print $5}')"
          done
          
          # –С–µ—А–µ–Љ –њ–µ—А–≤—Л–є APK
          FIRST_APK=$(echo "$APK_FILES" | head -n 1)
          FILENAME="${{ env.APP_NAME }}-v${{ steps.version.outputs.version }}.apk"
          FILENAME_CLEAN=$(echo "$FILENAME" | tr ' ' '-')
          
          cp "$FIRST_APK" "./$FILENAME_CLEAN"
          echo "рЯУ¶ –Ш—В–Њ–≥–Њ–≤—Л–є —Д–∞–є–ї: $FILENAME_CLEAN"
          echo "filename=$FILENAME_CLEAN" >> $GITHUB_OUTPUT
          echo "size=$(ls -lh $FILENAME_CLEAN | awk '{print $5}')" >> $GITHUB_OUTPUT
      
      - name: рЯУ§ Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.filename }}
          path: ./${{ steps.apk.outputs.filename }}
          if-no-files-found: error
          retention-days: 90
          compression-level: 0
      
      - name: рЯУК Build summary
        run: |
          echo "## рЯУ± –†–µ–Ј—Г–ї—М—В–∞—В —Б–±–Њ—А–Ї–Є" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| –Я–∞—А–∞–Љ–µ—В—А | –Ч–љ–∞—З–µ–љ–Є–µ |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| **–Я—А–Є–ї–Њ–ґ–µ–љ–Є–µ** | ${{ env.APP_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **–Я–∞–Ї–µ—В** | \`${{ env.PACKAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **–Т–µ—А—Б–Є—П** | ${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **–§–∞–є–ї** | \`${{ steps.apk.outputs.filename }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **–†–∞–Ј–Љ–µ—А** | ${{ steps.apk.outputs.size }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **–°—В–∞—В—Г—Б** | вЬЕ –£—Б–њ–µ—И–љ–Њ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### вЪ° –Я—А–Њ–Є–Ј–≤–Њ–і–Є—В–µ–ї—М–љ–Њ—Б—В—М" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          ccache -s >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "вђЗпЄП –°–Ї–∞—З–∞–є—В–µ APK –Є–Ј —А–∞–Ј–і–µ–ї–∞ **Artifacts** –≤—Л—И–µ" >> $GITHUB_STEP_SUMMARY
