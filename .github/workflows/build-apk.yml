name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия для сборки'
        required: false
        default: '0.1.3'
        type: string

jobs:
  build:
    runs-on: ubuntu-22.04  # ВАЖНО: используем Ubuntu 22.04 вместо 24.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
      
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \          # В Ubuntu 22.04 этот пакет есть!
            cmake \
            libffi-dev \
            libssl-dev \
            wget \
            curl \
            build-essential \
            ccache
      
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install python-for-android cython
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
      
      - name: Set version
        id: version
        run: |
          if [[ "${{ github.event.inputs.version }}" != "" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=0.1.3" >> $GITHUB_OUTPUT
          fi
      
      - name: Build APK
        run: |
          p4a apk \
            --private . \
            --package=org.alexstudiocode.roguelike \
            --name "Roguelike Adventure" \
            --version ${{ steps.version.outputs.version }} \
            --bootstrap=sdl2 \
            --requirements="python3,kivy==2.2.1,pyjnius,android" \
            --arch=arm64-v8a \
            --arch=armeabi-v7a \
            --permission WRITE_EXTERNAL_STORAGE \
            --permission READ_EXTERNAL_STORAGE \
            --orientation=landscape \
            --window \
            --verbose
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: roguelike-adventure-v${{ steps.version.outputs.version }}
          path: ./*.apk
          if-no-files-found: error
          retention-days: 90
