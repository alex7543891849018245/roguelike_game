name: 🏗️ Сборка Android APK

env:
  APP_NAME: "Roguelike Adventure"
  PACKAGE_NAME: "org.alexstudiocode.roguelike"
  VERSION: "0.1.3"
  ANDROID_API: "34"

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      version:
        description: '📦 Версия приложения'
        required: false
        default: '0.1.3'

jobs:
  build:
    name: 📱 Сборка APK
    runs-on: ubuntu-22.04
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
      
      - name: 💾 Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android
            /usr/local/lib/android/sdk
          key: ${{ runner.os }}-android
          restore-keys: |
            ${{ runner.os }}-android-
      
      - name: 🤖 Setup Android SDK and NDK
        run: |
          export ANDROID_HOME="/usr/local/lib/android/sdk"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          
          echo "📦 Проверка Android SDK..."
          
          # Создаем директории если нужно
          mkdir -p $ANDROID_HOME/cmdline-tools
          mkdir -p $ANDROID_HOME/licenses
          
          # Проверяем наличие command line tools
          if [ ! -d "$ANDROID_HOME/cmdline-tools/latest" ]; then
            echo "📥 Скачивание command line tools..."
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
            unzip -q commandlinetools-linux-9477386_latest.zip -d $ANDROID_HOME/cmdline-tools
            mv $ANDROID_HOME/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
          fi
          
          # Принимаем лицензии
          touch $ANDROID_HOME/licenses/android-sdk-license
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_HOME/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
          
          echo "✅ Android SDK готов"
      
      - name: 🔍 Find NDK version
        id: ndk
        run: |
          ANDROID_HOME="/usr/local/lib/android/sdk"
          
          # Ищем любую установленную версию NDK
          if [ -d "$ANDROID_HOME/ndk" ]; then
            NDK_VERSIONS=$(ls -1 $ANDROID_HOME/ndk/ | sort -V)
            NDK_COUNT=$(echo "$NDK_VERSIONS" | wc -l)
            
            if [ "$NDK_COUNT" -gt 0 ]; then
              # Берем первую (самую старую/стабильную) версию
              NDK_VERSION=$(echo "$NDK_VERSIONS" | head -n 1)
              NDK_PATH="$ANDROID_HOME/ndk/$NDK_VERSION"
              
              echo "📌 Найдена версия NDK: $NDK_VERSION"
              echo "ndk_version=$NDK_VERSION" >> $GITHUB_OUTPUT
              echo "ndk_path=$NDK_PATH" >> $GITHUB_OUTPUT
              echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
              echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
              echo "$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH
            else
              echo "❌ NDK не найден!"
              exit 1
            fi
          else
            echo "❌ Папка ndk не существует!"
            exit 1
          fi
      
      - name: 📦 Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            wget curl build-essential ccache \
            libstdc++-12-dev \
            liblzma-dev \
            libbz2-dev
      
      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install python-for-android cython==0.29.36
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
      
      - name: 🔖 Set version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || env.VERSION }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📌 Версия: $VERSION"
      
      - name: ✅ Verify NDK
        run: |
          ANDROID_HOME="/usr/local/lib/android/sdk"
          NDK_PATH="${{ steps.ndk.outputs.ndk_path }}"
          
          echo "📁 Проверка NDK по пути: $NDK_PATH"
          
          TOOLCHAIN_PATH="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin"
          CLANG_PATH="$TOOLCHAIN_PATH/clang"
          
          if [ -f "$CLANG_PATH" ]; then
            echo "✅ Clang найден: $CLANG_PATH"
            $CLANG_PATH --version
          else
            echo "❌ Clang не найден!"
            echo "📁 Содержимое $TOOLCHAIN_PATH:"
            ls -la $TOOLCHAIN_PATH/
            exit 1
          fi
      
      - name: 🏗️ Build APK
        run: |
          echo "🏗️ Начинаем сборку APK..."
          echo "📱 Приложение: ${{ env.APP_NAME }}"
          echo "📦 Пакет: ${{ env.PACKAGE_NAME }}"
          
          mkdir -p build_logs
          
          ANDROID_HOME="/usr/local/lib/android/sdk"
          NDK_PATH="${{ steps.ndk.outputs.ndk_path }}"
          
          # Извлекаем версию NDK из пути
          NDK_VERSION=$(basename $NDK_PATH)
          
          p4a apk \
            --private . \
            --package="${{ env.PACKAGE_NAME }}" \
            --name "${{ env.APP_NAME }}" \
            --version ${{ steps.version.outputs.version }} \
            --bootstrap=sdl2 \
            --requirements="python3,kivy==2.2.1,pyjnius,android" \
            --arch=arm64-v8a \
            --arch=armeabi-v7a \
            --permission WRITE_EXTERNAL_STORAGE \
            --permission READ_EXTERNAL_STORAGE \
            --orientation=landscape \
            --sdk_dir=$ANDROID_HOME \
            --ndk_dir=$NDK_PATH \
            --ndk_version=$NDK_VERSION \
            --android_api 34 \
            --window \
            --debug \
            --verbose 2>&1 | tee build_logs/build.log
          
          echo "✅ Сборка завершена"
      
      - name: 🔍 Find APK
        id: apk
        run: |
          APK_FILES=$(find . -name "*.apk" -type f)
          
          if [ -z "$APK_FILES" ]; then
            echo "❌ APK не найден!"
            echo "📋 Логи сборки:"
            cat build_logs/build.log
            exit 1
          fi
          
          FIRST_APK=$(echo "$APK_FILES" | head -n 1)
          FILENAME="${{ env.APP_NAME }}-v${{ steps.version.outputs.version }}.apk"
          FILENAME_CLEAN=$(echo "$FILENAME" | tr ' ' '-')
          
          cp "$FIRST_APK" "./$FILENAME_CLEAN"
          echo "📦 APK готов: $FILENAME_CLEAN"
          echo "filename=$FILENAME_CLEAN" >> $GITHUB_OUTPUT
      
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.filename }}
          path: ./${{ steps.apk.outputs.filename }}
          retention-days: 90
